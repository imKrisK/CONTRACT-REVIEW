<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing - Contract Review (5555Hz)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .contract-gradient {
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
        }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="contract-gradient shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i class="fas fa-file-signature text-white text-2xl mr-3"></i>
                    <h1 class="text-2xl font-bold text-white">Contract Review</h1>
                    <span class="ml-3 px-3 py-1 bg-white bg-opacity-20 rounded-full text-xs text-white font-semibold">5555Hz</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex h-screen bg-gray-50">
        <aside class="w-64 bg-white shadow-md">
            <nav class="mt-5 px-4">
                <a href="dashboard.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-md text-gray-700 hover:bg-gray-100 mb-2">
                    <i class="fas fa-home mr-3"></i>Dashboard
                </a>
                <a href="billing.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-md text-white bg-purple-600 mb-2">
                    <i class="fas fa-credit-card mr-3"></i>Billing
                </a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            <div class="max-w-7xl mx-auto">
                <h2 class="text-3xl font-bold text-gray-900 mb-8">Billing & Subscription</h2>

                <div class="bg-white rounded-lg shadow p-6 mb-8">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Current Plan</h3>
                    <div class="flex items-center justify-between p-4 bg-purple-50 rounded-lg">
                        <div>
                            <p class="text-xl font-bold text-gray-900">Enterprise Plan</p>
                            <p class="text-gray-600">Unlimited contract reviews & settlements</p>
                        </div>
                        <div class="text-right">
                            <p class="text-3xl font-bold text-purple-600">$149</p>
                            <p class="text-sm text-gray-600">per month</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-6 mb-8">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Payment Method</h3>
                    <div class="flex items-center p-4 border-2 border-gray-200 rounded-lg">
                        <i class="fas fa-credit-card text-purple-600 text-2xl mr-4"></i>
                        <div class="flex-1">
                            <p class="font-semibold">Visa ending in 4242</p>
                            <p class="text-sm text-gray-600">Expires 12/2025</p>
                        </div>
                        <button class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">
                            Update
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow">
                    <div class="px-6 py-4 border-b border-gray-200">
                        <h3 class="text-lg font-semibold text-gray-900">Invoice History</h3>
                    </div>
                    <div class="p-6">
                        <table class="min-w-full">
                            <thead>
                                <tr class="border-b">
                                    <th class="text-left py-3 px-4 text-sm font-semibold text-gray-700">Date</th>
                                    <th class="text-left py-3 px-4 text-sm font-semibold text-gray-700">Amount</th>
                                    <th class="text-left py-3 px-4 text-sm font-semibold text-gray-700">Status</th>
                                    <th class="text-left py-3 px-4 text-sm font-semibold text-gray-700">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr class="border-b hover:bg-gray-50">
                                    <td class="py-3 px-4">Mar 1, 2026</td>
                                    <td class="py-3 px-4">$149.00</td>
                                    <td class="py-3 px-4">
                                        <span class="px-2 py-1 bg-green-100 text-green-800 rounded text-xs font-semibold">Paid</span>
                                    </td>
                                    <td class="py-3 px-4">
                                        <button class="text-purple-600 hover:underline text-sm">Download</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
