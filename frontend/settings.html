<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Contract Review (5555Hz)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .contract-gradient {
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
        }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="contract-gradient shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i class="fas fa-file-signature text-white text-2xl mr-3"></i>
                    <h1 class="text-2xl font-bold text-white">Contract Review</h1>
                    <span class="ml-3 px-3 py-1 bg-white bg-opacity-20 rounded-full text-xs text-white font-semibold">5555Hz</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex h-screen bg-gray-50">
        <aside class="w-64 bg-white shadow-md">
            <nav class="mt-5 px-4">
                <a href="dashboard.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-md text-gray-700 hover:bg-gray-100 mb-2">
                    <i class="fas fa-home mr-3"></i>Dashboard
                </a>
                <a href="settings.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-md text-white bg-purple-600 mb-2">
                    <i class="fas fa-cog mr-3"></i>Settings
                </a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            <div class="max-w-4xl mx-auto">
                <h2 class="text-3xl font-bold text-gray-900 mb-8">Account Settings</h2>

                <div class="bg-white rounded-lg shadow p-6 mb-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Profile Information</h3>
                    <form class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                            <input type="text" value="John Doe" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                            <input type="email" value="john@example.com" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                        </div>
                        <button type="submit" class="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">
                            Save Changes
                        </button>
                    </form>
                </div>

                <div class="bg-white rounded-lg shadow p-6 mb-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">API Access</h3>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">API Key</label>
                        <div class="flex gap-2">
                            <input type="text" value="sk_5555_********************************" readonly class="flex-1 px-4 py-2 border border-gray-300 rounded-lg bg-gray-50">
                            <button class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">
                                <i class="fas fa-copy"></i> Copy
                            </button>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Notifications</h3>
                    <div class="space-y-3">
                        <label class="flex items-center">
                            <input type="checkbox" checked class="form-checkbox h-5 w-5 text-purple-600">
                            <span class="ml-3 text-gray-700">Email notifications for contract reviews</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" checked class="form-checkbox h-5 w-5 text-purple-600">
                            <span class="ml-3 text-gray-700">Settlement draft completion alerts</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" class="form-checkbox h-5 w-5 text-purple-600">
                            <span class="ml-3 text-gray-700">Weekly risk assessment reports</span>
                        </label>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
