<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Contract - Contract Review (5555Hz)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .contract-gradient {
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
        }
        .drop-zone {
            border: 2px dashed #d1d5db;
            transition: all 0.3s ease;
        }
        .drop-zone.drag-over {
            border-color: #a855f7;
            background-color: #faf5ff;
        }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="contract-gradient shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i class="fas fa-file-signature text-white text-2xl mr-3"></i>
                    <h1 class="text-2xl font-bold text-white">Contract Review</h1>
                    <span class="ml-3 px-3 py-1 bg-white bg-opacity-20 rounded-full text-xs text-white font-semibold">5555Hz</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex h-screen bg-gray-50">
        <aside class="w-64 bg-white shadow-md">
            <nav class="mt-5 px-4">
                <a href="dashboard.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-md text-gray-700 hover:bg-gray-100 mb-2">
                    <i class="fas fa-home mr-3"></i>Dashboard
                </a>
                <a href="upload-contract.html" class="flex items-center px-4 py-3 text-sm font-medium rounded-md text-white bg-purple-600 mb-2">
                    <i class="fas fa-upload mr-3"></i>Upload Contract
                </a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            <div class="max-w-4xl mx-auto">
                <h2 class="text-3xl font-bold text-gray-900 mb-8">Upload Contract for Review</h2>

                <div class="bg-white rounded-lg shadow p-6 mb-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Contract Details</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Contract Name</label>
                            <input type="text" id="contractName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="Enter contract name">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Contract Type</label>
                            <select id="contractType" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                                <option value="">Select type...</option>
                                <option value="settlement">Settlement Agreement</option>
                                <option value="nda">Non-Disclosure Agreement</option>
                                <option value="employment">Employment Contract</option>
                                <option value="service">Service Agreement</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Parties Involved</label>
                            <input type="text" id="parties" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="e.g., Company A, Person B">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Contract Value</label>
                            <input type="number" id="contractValue" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="0.00">
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-6 mb-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Upload Contract File</h3>
                    <div id="dropZone" class="drop-zone p-12 text-center rounded-lg cursor-pointer">
                        <i class="fas fa-cloud-upload-alt text-6xl text-purple-600 mb-4"></i>
                        <p class="text-xl font-semibold text-gray-700 mb-2">Drag and drop contract here</p>
                        <p class="text-gray-500 mb-4">or click to browse</p>
                        <input type="file" id="fileInput" accept=".pdf,.doc,.docx" class="hidden">
                        <button onclick="document.getElementById('fileInput').click()" class="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">
                            Browse Files
                        </button>
                    </div>
                    <div id="fileDisplay" class="mt-4"></div>
                </div>

                <button id="uploadBtn" class="w-full px-6 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-semibold">
                    <i class="fas fa-upload mr-2"></i>Upload & Analyze Contract
                </button>
            </div>
        </main>
    </div>

    <script>
        let selectedFile = null;
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileDisplay = document.getElementById('fileDisplay');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) {
                selectedFile = e.dataTransfer.files[0];
                displayFile();
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                displayFile();
            }
        });

        function displayFile() {
            if (selectedFile) {
                fileDisplay.innerHTML = `
                    <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                        <div class="flex items-center">
                            <i class="fas fa-file-contract text-purple-600 text-2xl mr-3"></i>
                            <div>
                                <p class="font-semibold">${selectedFile.name}</p>
                                <p class="text-sm text-gray-500">${(selectedFile.size / 1024 / 1024).toFixed(2)} MB</p>
                            </div>
                        </div>
                        <button onclick="removeFile()" class="text-red-600 hover:text-red-800">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `;
            }
        }

        function removeFile() {
            selectedFile = null;
            fileDisplay.innerHTML = '';
            fileInput.value = '';
        }

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            if (!selectedFile) {
                alert('Please select a contract file');
                return;
            }

            const formData = new FormData();
            formData.append('contract_name', document.getElementById('contractName').value);
            formData.append('contract_type', document.getElementById('contractType').value);
            formData.append('parties', document.getElementById('parties').value);
            formData.append('contract_value', document.getElementById('contractValue').value);
            formData.append('file', selectedFile);

            try {
                const response = await fetch('http://localhost:5555/api/contracts/upload', {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    alert('Contract uploaded successfully! Starting analysis...');
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                alert('Upload failed. Please try again.');
            }
        });
    </script>
</body>
</html>
